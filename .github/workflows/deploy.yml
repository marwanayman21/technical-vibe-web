name: Deploy to VPS

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PROJECT_PATH: technical-vibe

jobs:
  # ------------------------------------------------------------------
  # 1. Build & Push Docker Image
  # ------------------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # 2. Deploy to VPS
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Pre-create deployment directory on VPS to ensure SCP action works reliably
      - name: Create Deployment Directory via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            mkdir -p $HOME/${{ env.PROJECT_PATH }}

      # Copy docker-compose.production.yml and nginx.conf to VPS
      - name: Copy Config Files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.production.yml,nginx/"
          target: "${{ env.PROJECT_PATH }}"

      # Execute Remote Deployment Commands
      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            set -x

            # 1. Prepare and change to deployment directory
            mkdir -p $HOME/${{ env.PROJECT_PATH }}
            cd $HOME/${{ env.PROJECT_PATH }}

            # 2. Write environment variables for Docker Compose
            cat > .env << 'ENVEOF'
            APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}:latest
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ENVEOF

            # 3. Pull new images from GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Save current image tags for rollback
            OLD_APP=$(docker inspect --format='{{.Config.Image}}' technical-vibe-app 2>/dev/null || echo "")

            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}:latest

            # 4. Determine Docker Compose command (compatibility layer from IRS)
            if sudo docker compose version > /dev/null 2>&1; then
              DOCKER_COMPOSE="sudo docker compose"
            else
              DOCKER_COMPOSE="sudo docker-compose"
            fi

            # 5. Run Docker Compose
            $DOCKER_COMPOSE -f docker-compose.production.yml up -d --remove-orphans
            
            # 6. Cleanup unused dangling images
            sudo docker image prune -f

            # 7. Verify Health
            echo "🔍 Checking containers..."
            sleep 15
            
            HEALTHY=true
            for container in technical-vibe-postgres technical-vibe-app technical-vibe-nginx; do
              # Try health status first (for containers with healthcheck), fall back to running status
              STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' $container 2>/dev/null || echo "not found")
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                echo "✅ $container is $STATUS"
              else
                echo "⚠️ $container is $STATUS"
                HEALTHY=false
              fi
            done
            
            if [ "$HEALTHY" = false ]; then
              echo "❌ Health check failed! Printing container logs..."
              sudo docker logs technical-vibe-app || true
              echo "❌ Rolling back..."
              if [ -n "$OLD_APP" ]; then
                $DOCKER_COMPOSE -f docker-compose.production.yml down
                $DOCKER_COMPOSE -f docker-compose.production.yml up -d
              fi
              exit 1
            fi

            # 8. Update host Nginx configuration for Security Headers & ElCapitano AC subdomain
            echo "🔒 Updating Host Nginx Configuration..."
            sudo tee /etc/nginx/sites-available/technicalsvibes.conf << 'NGINXEOF'
server {
    listen 80;
    server_name technicalsvibes.com www.technicalsvibes.com 
                *.technicalsvibes.com *.fbacademy.technicalsvibes.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name technicalsvibes.com www.technicalsvibes.com;
    include snippets/ssl-params.conf;
    include snippets/cloudflare-ips.conf;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval' *.cloudinary.com;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:8083;
    }
}

